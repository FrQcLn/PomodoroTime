<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodorooq</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: linear-gradient(rgba(10, 15, 20, 0.3), rgba(10, 15, 20, 0.3)), url('hutan.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e0; padding: 20px;
        }

        /* Tombol Fullscreen */
        .fullscreen-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.1); }

        /* Container Utama */
        .container {
            display: flex; flex-direction: row;
            background: rgba(20, 25, 30, 0.35); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; padding: 40px; width: 100%; max-width: 950px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15);
            gap: 40px;
        }

        .timer-section {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.15); padding-right: 40px;
        }

        .timer-section h1 { margin: 0; font-size: 24px; color: #8ab4f8; font-weight: 600; }

        .status {
            font-size: 16px; margin-top: 15px; text-transform: uppercase;
            letter-spacing: 3px; color: #a8c7fa; font-weight: 600;
        }

        .timer-display {
            font-size: clamp(60px, 10vw, 100px); font-weight: 700; margin: 10px 0;
            color: #ffffff; text-shadow: 0 4px 15px rgba(0,0,0,0.6); line-height: 1;
        }

        .session-info { font-size: 14px; margin-bottom: 25px; color: #e8eaed; }

        .controls { display: flex; gap: 15px; }
        .controls button {
            background: #1e8e3e; color: white; border: none; padding: 12px 25px;
            border-radius: 10px; font-size: 15px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .controls button:hover { background: #188038; transform: translateY(-2px); }
        .controls button#resetBtn { background: #d93025; }

        /* Sisi Kanan */
        .settings-section { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .settings-card {
            background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .settings-card h3 { margin: 0 0 15px 0; font-size: 16px; color: #8ab4f8; display: flex; align-items: center; gap: 10px; }
        
        .setting-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; }
        .setting-group input {
            width: 55px; padding: 6px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4); color: white; text-align: center;
        }

        .apply-btn {
            background: #8ab4f8; color: #1a1a1a; border: none; padding: 10px;
            border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s;
        }
        .apply-btn:hover { background: #aecbff; }

        /* Musik Custom */
        .music-input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .music-input-group input {
            flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4); color: white; font-size: 12px;
        }
        .music-input-group button { background: #5f6368; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .music-container { width: 100%; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.3); }

        /* MODAL POP-UP VIDEO ALARM */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1000; display: none; 
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(20, 25, 30, 0.9); border: 1px solid rgba(138, 180, 248, 0.3);
            padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 600px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .modal-content h2 { margin-top: 0; font-size: 26px; color: #8ab4f8; margin-bottom: 20px; }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; /* Rasio 16:9 */ height: 0;
            border-radius: 12px; overflow: hidden; margin-bottom: 25px; background: #000;
        }

        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .close-modal-btn {
            background: #d93025; color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .close-modal-btn:hover { background: #c5221f; }

        /* Media Query HP */
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 25px; }
            .timer-section { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding-right: 0; padding-bottom: 30px; }
        }
    </style>
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>

    <div class="container">
        <div class="timer-section">
            <h1>Pomodoro Studio</h1>
            <div class="status" id="statusText">Fokus</div>
