<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli Night Pomodoro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Latar Belakang Hutan Ghibli */
            background-image: linear-gradient(rgba(10, 15, 20, 0.4), rgba(10, 15, 20, 0.4)), url('https://www.pinterest.com/pin/1043709282380057044/'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
        }

        .container {
            display: flex;
            flex-direction: row;
            background: rgba(20, 25, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            width: 850px;
            max-width: 95%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 40px;
        }

        /* Sisi Kiri: Timer */
        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            padding-right: 40px;
        }

        .timer-section h1 {
            margin-top: 0;
            font-size: 28px;
            color: #8ab4f8;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status {
            font-size: 18px;
            font-weight: 400;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a8c7fa;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .timer-display {
            font-size: 100px;
            font-weight: 700;
            margin: 10px 0;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            line-height: 1;
        }

        .session-info {
            font-size: 15px;
            margin-bottom: 30px;
            color: #bdc1c6;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .controls button {
            background: #1e8e3e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .controls button:hover {
            background: #188038;
            transform: translateY(-2px);
        }

        .controls button#resetBtn {
            background: #d93025;
        }
        
        .controls button#resetBtn:hover {
            background: #c5221f;
        }

        /* Sisi Kanan: Pengaturan & Musik */
        .settings-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .settings-section h3 {
            margin-top: 0;
            font-size: 18px;
            color: #8ab4f8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #e8eaed;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .setting-group input {
            width: 60px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #5f6368;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }

        .setting-group input:focus {
            outline: none;
            border-color: #8ab4f8;
        }

        .apply-btn {
            width: 100%;
            background: #3c4043;
            color: white;
            border: 1px solid #5f6368;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 25px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .apply-btn:hover {
            background: #5f6368;
        }

        /* Pemutar Musik */
        .music-player {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .music-player h3 {
            border-bottom: none;
            margin-bottom: 10px;
            padding-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Sisi Kiri: Timer -->
        <div class="timer-section">
            <h1>Pomodoro Studio</h1>
            <div class="status" id="statusText">Fokus</div>
            <div class="timer-display" id="timeDisplay">25:00</div>
            <div class="session-info" id="sessionText">Sesi 1 dari 4</div>

            <div class="controls">
                <button id="startPauseBtn" onclick="toggleTimer()">Mulai</button>
                <button id="resetBtn" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <!-- Sisi Kanan: Pengaturan & Musik -->
        <div class="settings-section">
            <h3>Pengaturan Waktu (Menit)</h3>
            <div class="setting-group">
                <label>Waktu Fokus</label>
                <input type="number" id="focusInput" value="25" min="1">
            </div>
            <div class="setting-group">
                <label>Istirahat Pendek</label>
                <input type="number" id="shortBreakInput" value="5" min="1">
            </div>
            <div class="setting-group">
                <label>Istirahat Panjang</label>
                <input type="number" id="longBreakInput" value="15" min="1">
            </div>
            <div class="setting-group">
                <label>Total Sesi</label>
                <input type="number" id="sessionsInput" value="4" min="1">
            </div>
            <button class="apply-btn" onclick="applySettings()">Terapkan Pengaturan</button>

            <!-- Spotify Embed Player -->
            <div class="music-player">
                <h3>Playlist Latar (Spotify)</h3>
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZeKCadgRdKQ?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script>
        let focusTime = 25 * 60;
        let shortBreakTime = 5 * 60;
        let longBreakTime = 15 * 60;
        let targetSessions = 4;

        let timeLeft = focusTime;
        let timerInterval;
        let isRunning = false;
        let currentMode = 'focus'; 
        let currentSession = 1;

        const timeDisplay = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const sessionText = document.getElementById('sessionText');
        const startPauseBtn = document.getElementById('startPauseBtn');

        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            timeDisplay.textContent = `${minutes}:${seconds}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                startPauseBtn.textContent = "Lanjut";
            } else {
                timerInterval = setInterval(countdown, 1000);
                startPauseBtn.textContent = "Jeda";
            }
            isRunning = !isRunning;
        }

        function countdown() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                switchMode();
            }
        }

        function switchMode() {
            clearInterval(timerInterval);
            isRunning = false;
            startPauseBtn.textContent = "Mulai";

            if (currentMode === 'focus') {
                if (currentSession >= targetSessions) {
                    currentMode = 'longBreak';
                    timeLeft = longBreakTime;
                    statusText.textContent = "Istirahat Panjang";
                    currentSession = 0; 
                } else {
                    currentMode = 'shortBreak';
                    timeLeft = shortBreakTime;
                    statusText.textContent = "Istirahat Pendek";
                }
            } else {
                currentMode = 'focus';
                timeLeft = focusTime;
                statusText.textContent = "Fokus";
                currentSession++;
            }

            sessionText.textContent = `Sesi ${currentSession === 0 ? targetSessions : currentSession} dari ${targetSessions}`;
            updateDisplay();
            
            alert(`Waktu ${currentMode === 'focus' ? 'Istirahat selesai, waktunya Fokus!' : 'Fokus selesai, waktunya Istirahat!'}`);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = 'focus';
            currentSession = 1;
            timeLeft = focusTime;
            
            statusText.textContent = "Fokus";
            sessionText.textContent = `Sesi ${currentSession} dari ${targetSessions}`;
            startPauseBtn.textContent = "Mulai";
            updateDisplay();
        }

        function applySettings() {
            focusTime = document.getElementById('focusInput').value * 60;
            shortBreakTime = document.getElementById('shortBreakInput').value * 60;
            longBreakTime = document.getElementById('longBreakInput').value * 60;
            targetSessions = document.getElementById('sessionsInput').value;
            
            resetTimer(); 
        }

        updateDisplay();
    </script>
</body>
</html>
